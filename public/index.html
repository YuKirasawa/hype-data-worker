<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AF Buyback Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f0f0f;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
}
.update-btn {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: #2a2a2a;
  color: #e0e0e0;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 0.5rem 1rem;
  cursor: pointer;
  font-size: 0.85rem;
  transition: background 0.2s;
}
.update-btn:hover { background: #3a3a3a; }
.update-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.dashboard {
  max-width: 800px;
  width: 100%;
}
h1 {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  color: #fff;
}
.subtitle {
  color: #888;
  margin-bottom: 2rem;
  font-size: 0.9rem;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
.card {
  background: linear-gradient(135deg, #1a1a1a 0%, #1e1e1e 100%);
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  padding: 1.5rem;
  transition: border-color 0.2s, transform 0.2s;
}
.card:hover { border-color: #3a3a3a; transform: translateY(-1px); }
.card.full { grid-column: 1 / -1; }
.card-label {
  font-size: 0.8rem;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
}
.card-value {
  font-size: 1.75rem;
  font-weight: 700;
  color: #fff;
}
.card-value.usd { color: #4ade80; }
.card-value.hype { color: #ce9eff; }
.card-value.supply { color: #60a5fa; }
.card-value.interest { color: #fbbf24; }
.card-value.revenue { color: #34d399; }
.card-value.pe { color: #fb923c; }
</style>
</head>
<body>
<div class="dashboard">
  <h1>AF Buyback Dashboard</h1>
  <button class="update-btn" id="updateBtn" onclick="triggerUpdate()">↻ Update</button>
  <button class="update-btn" id="reloadBtn" onclick="load()" style="right: 7.5rem;">↻ Reload</button>
  <button class="update-btn" id="scheduledBtn" onclick="triggerScheduled()" style="right: 14rem;">⏰ Scheduled</button>
  <p class="subtitle" id="updated">Loading...</p>
  <div class="grid">
    <div class="card">
      <div class="card-label">Daily Revenue (USD)</div>
      <div class="card-value revenue" id="revenue">—</div>
    </div>
    <div class="card">
      <div class="card-label">Daily Annualized PE (Total as 0.6B HYPE)</div>
      <div class="card-value pe" id="pe">—</div>
    </div>
    <div class="card">
      <div class="card-label">Current Balance</div>
      <div class="card-value hype" id="balance">—</div>
    </div>
    <div class="card">
      <div class="card-label">HYPE Price</div>
      <div class="card-value usd" id="price">—</div>
    </div>
    <div class="card">
      <div class="card-label">24h Buyback (HYPE)</div>
      <div class="card-value hype" id="buybackHype">—</div>
    </div>
    <div class="card">
      <div class="card-label">24h Buyback (USD)</div>
      <div class="card-value usd" id="buybackUsd">—</div>
    </div>
    <div class="card full">
      <div class="card-label">USDC Supply</div>
      <div class="card-value supply" id="usdcSupply">—</div>
    </div>
    <div class="card full">
      <div class="card-label">Daily USDC Interest (3.5% APY)</div>
      <div class="card-value interest" id="usdcInterest">—</div>
    </div>
  </div>
</div>
<script>
const fmt = new Intl.NumberFormat('en-US');

async function load() {
  try {
    const res = await fetch('/api');
    const data = await res.json();
    document.getElementById('revenue').textContent = '$' + fmt.format(data.revenue);
    document.getElementById('pe').textContent = fmt.format(data.pe);
    document.getElementById('balance').textContent = fmt.format(data.currentBalance) + ' HYPE';
    document.getElementById('price').textContent = '$' + data.hypePrice.toFixed(4);
    document.getElementById('buybackHype').textContent = fmt.format(data.buybackHype) + ' HYPE';
    document.getElementById('buybackUsd').textContent = '$' + fmt.format(data.buybackUsd);
    document.getElementById('usdcSupply').textContent = '$' + fmt.format(data.USDCSupply);
    document.getElementById('usdcInterest').textContent = '$' + fmt.format(data.USDCDailyInterest);
    document.getElementById('updated').textContent = 'Updated: ' + new Date().toLocaleString();
  } catch (e) {
    document.getElementById('updated').textContent = 'Failed to load data';
  }
}
load();

async function triggerScheduled() {
  const passwd = prompt('Enter password to trigger scheduled task:');
  if (!passwd) return;
  const btn = document.getElementById('scheduledBtn');
  btn.disabled = true;
  btn.textContent = '⏰ Running...';
  try {
    const res = await fetch('/api/scheduled', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ passwd }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Request failed');
    }
    await load();
  } catch (e) {
    document.getElementById('updated').textContent = 'Scheduled failed: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '⏰ Scheduled';
  }
}

async function triggerUpdate() {
  const btn = document.getElementById('updateBtn');
  btn.disabled = true;
  btn.textContent = '↻ Updating...';
  try {
    await fetch('/api/update');
    await load();
  } catch (e) {
    document.getElementById('updated').textContent = 'Update failed';
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Update';
  }
}
</script>
</body>
</html>
